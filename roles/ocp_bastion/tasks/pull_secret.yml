---
- name: Copy pull secret to bastion
  ansible.builtin.copy:
    src: "{{ pull_secret_path }}"
    dest: /root/.pullsecret.json
    mode: "0600"

- name: Read pull secret
  ansible.builtin.slurp:
    src: /root/.pullsecret.json
  register: _pull_secret_raw

- name: Create .docker directory
  ansible.builtin.file:
    path: /root/.docker
    state: directory
    mode: "0700"

- name: Build merged pull secret with mirror registry credentials
  ansible.builtin.copy:
    content: >-
      {{ _pull_secret_raw.content | b64decode | from_json |
         combine({"auths": {_quay_url: {"auth": _quay_auth}}}, recursive=true) |
         to_nice_json }}
    dest: /root/.docker/config.json
    mode: "0600"
  vars:
    _quay_url: "{{ quay_hostname }}:{{ quay_port }}"
    _quay_auth: "{{ (quay_init_user ~ ':' ~ quay_init_password) | b64encode }}"
