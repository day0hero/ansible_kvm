---
- name: Create mirror working directory
  ansible.builtin.file:
    path: "{{ ocp_mirror_dir }}/working-dir"
    state: directory
    mode: "0755"

- name: Template imageset-config.yaml
  ansible.builtin.template:
    src: imageset-config.yaml.j2
    dest: "{{ ocp_mirror_dir }}/imageset-config.yaml"
    mode: "0644"

- name: Check for oc-mirror completion marker
  ansible.builtin.stat:
    path: "{{ ocp_mirror_dir }}/.mirror-complete"
  register: _mirror_done

- name: Mirror OCP content to Quay registry
  when: not _mirror_done.stat.exists
  block:
    - name: Run oc-mirror with retries (this will take a long time)
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          for attempt in 1 2 3 4 5; do
            echo "=== oc-mirror attempt ${attempt} ===" >&2
            /usr/local/bin/oc-mirror \
              --config {{ ocp_mirror_dir }}/imageset-config.yaml \
              docker://{{ quay_hostname }}:{{ quay_port }} \
              --v2 \
              --workspace file://{{ ocp_mirror_dir }}/working-dir \
              --authfile /root/.docker/config.json \
              2>&1 | tee -a {{ ocp_mirror_dir }}/oc-mirror.log && exit 0
            echo "=== attempt ${attempt} failed, retrying in 30s ===" >&2
            sleep 30
          done
          exit 1
        chdir: "{{ ocp_mirror_dir }}"
      async: 7200
      poll: 60
      changed_when: true

    - name: Verify IDMS files were generated
      ansible.builtin.find:
        paths: "{{ ocp_mirror_dir }}/working-dir/cluster-resources"
        patterns: "imageDigestMirrorSet*.yaml"
      register: _idms_check

    - name: Fail if IDMS files are missing
      ansible.builtin.assert:
        that: _idms_check.files | length > 0
        fail_msg: >-
          No imageDigestMirrorSet files found in
          {{ ocp_mirror_dir }}/working-dir/cluster-resources.
          The oc-mirror operation may have completed but produced no usable output.

    - name: Write completion marker
      ansible.builtin.copy:
        content: |
          mirror_completed: {{ ansible_date_time.iso8601 }}
          idms_files: {{ _idms_check.files | map(attribute='path') | list | to_nice_json }}
        dest: "{{ ocp_mirror_dir }}/.mirror-complete"
        mode: "0644"
