---
- name: Create mirror registry directory
  ansible.builtin.file:
    path: "{{ mirror_registry_dir }}"
    state: directory
    mode: "0755"

# --- Download ---
- name: Check if mirror-registry tarball already downloaded
  ansible.builtin.stat:
    path: /tmp/mirror-registry.tar.gz
  register: _mr_tarball

- name: Download mirror-registry tarball
  ansible.builtin.get_url:
    url: >-
      https://developers.redhat.com/content-gateway/file/pub/openshift-v4/clients/mirror-registry/{{
      mirror_registry_version }}/mirror-registry.tar.gz
    dest: /tmp/mirror-registry.tar.gz
    mode: "0644"
  when: not _mr_tarball.stat.exists

# --- Extract ---
- name: Check if mirror-registry binary already extracted
  ansible.builtin.stat:
    path: "{{ mirror_registry_dir }}/mirror-registry"
  register: _mr_binary

- name: Extract mirror-registry
  ansible.builtin.unarchive:
    src: /tmp/mirror-registry.tar.gz
    dest: "{{ mirror_registry_dir }}"
    remote_src: true
    mode: "0755"
  when: not _mr_binary.stat.exists

# --- Password ---
- name: Check for existing mirror registry password
  ansible.builtin.stat:
    path: /root/.quay-init-password
  register: _quay_pw_file

- name: Generate mirror registry password
  ansible.builtin.set_fact:
    _quay_init_password: "{{ lookup('password', '/dev/null length=16 chars=ascii_letters,digits') }}"
  when: not _quay_pw_file.stat.exists

- name: Read existing mirror registry password
  ansible.builtin.slurp:
    src: /root/.quay-init-password
  register: _quay_pw_content
  when: _quay_pw_file.stat.exists

- name: Set password from existing file
  ansible.builtin.set_fact:
    _quay_init_password: "{{ _quay_pw_content.content | b64decode | trim }}"
  when: _quay_pw_file.stat.exists

- name: Store mirror registry password
  ansible.builtin.copy:
    content: "{{ _quay_init_password }}"
    dest: /root/.quay-init-password
    mode: "0600"
  when: not _quay_pw_file.stat.exists

# --- Install ---
- name: Check if mirror registry is already installed
  ansible.builtin.command:
    cmd: podman ps --filter name=quay-app --format "{{ '{{' }}.Names{{ '}}' }}"
  register: _quay_running
  changed_when: false
  failed_when: false

- name: Install mirror registry
  ansible.builtin.command:
    cmd: >-
      {{ mirror_registry_dir }}/mirror-registry install
      --quayHostname {{ quay_hostname }}
      --quayRoot {{ mirror_registry_dir }}
      --initPassword {{ _quay_init_password }}
  when: "'quay-app' not in _quay_running.stdout"
  changed_when: true

# --- Set password fact for downstream tasks ---
- name: Read mirror registry password for downstream tasks
  ansible.builtin.slurp:
    src: /root/.quay-init-password
  register: _quay_pw_final

- name: Set mirror registry password fact
  ansible.builtin.set_fact:
    quay_init_password: "{{ _quay_pw_final.content | b64decode | trim }}"

# --- CA trust ---
- name: Find Quay root CA certificate
  ansible.builtin.find:
    paths:
      - /root/quay-install
      - "{{ mirror_registry_dir }}"
    patterns:
      - "rootCA.pem"
      - "rootca.pem"
    recurse: true
  register: _quay_ca_files

- name: Fail if Quay root CA not found
  ansible.builtin.assert:
    that: _quay_ca_files.files | length > 0
    fail_msg: >-
      Could not find Quay root CA certificate.
      Searched /root/quay-install and {{ mirror_registry_dir }} for rootCA.pem.

- name: Set Quay root CA path
  ansible.builtin.set_fact:
    _quay_ca_path: "{{ _quay_ca_files.files | sort(attribute='path') | map(attribute='path') | first }}"

- name: Copy Quay root CA to system trust anchors
  ansible.builtin.copy:
    src: "{{ _quay_ca_path }}"
    dest: /etc/pki/ca-trust/source/anchors/quay-rootCA.pem
    remote_src: true
    mode: "0644"

- name: Update CA trust store
  ansible.builtin.command:
    cmd: update-ca-trust
  changed_when: true
