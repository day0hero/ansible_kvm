---
- name: Identify airgap network interface
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail;
      ip -o addr show | grep '{{ bastion_ip }}/' | awk '{print $2}'
  register: _airgap_iface
  changed_when: false

- name: Set DNS server on airgap interface
  ansible.builtin.command:
    cmd: "resolvectl dns {{ _airgap_iface.stdout | trim }} {{ libvirt_network_airgap.ip }}"
  changed_when: true

- name: Route cluster domain to airgap DNS
  ansible.builtin.command:
    cmd: "resolvectl domain {{ _airgap_iface.stdout | trim }} ~{{ cluster_name }}.{{ dns_domain }} ~{{ dns_domain }}"
  changed_when: true

- name: Deploy NetworkManager dispatcher for persistent split DNS
  ansible.builtin.copy:
    content: |
      #!/bin/bash
      if [ "$1" = "{{ _airgap_iface.stdout | trim }}" ] && [ "$2" = "up" ]; then
          resolvectl dns "$1" {{ libvirt_network_airgap.ip }}
          resolvectl domain "$1" ~{{ cluster_name }}.{{ dns_domain }} ~{{ dns_domain }}
      fi
    dest: "/etc/NetworkManager/dispatcher.d/99-dns-airgap"
    mode: "0755"
