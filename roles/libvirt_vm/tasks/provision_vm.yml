---
# Included once per VM via loop variable `_current_vm`

- name: "{{ _current_vm.name }} | Set VM facts"
  ansible.builtin.set_fact:
    _vm_hostname: "{{ _current_vm.name }}"
    _vm_fqdn: "{{ _current_vm.name }}{% if cluster_name | default('') | length > 0 %}.{{ cluster_name }}{% endif %}.{{ dns_domain }}"
    _vm_disk: "{{ storage_pool_path }}/{{ _current_vm.name }}{% if cluster_name | default('') | length > 0 %}.{{ cluster_name }}{% endif %}.{{ dns_domain }}.qcow2"
    _vm_cidata: "{{ storage_pool_path }}/{{ _current_vm.name }}{% if cluster_name | default('') | length > 0 %}.{{ cluster_name }}{% endif %}.{{ dns_domain }}-cidata.iso"
    _vm_ci_dir: "/tmp/cloud-init-{{ _current_vm.name }}{% if cluster_name | default('') | length > 0 %}.{{ cluster_name }}{% endif %}.{{ dns_domain }}"
    _vm_base_image: "{{ _current_vm.base_image | default(base_image) }}"
    _vm_os_variant: "{{ _current_vm.os_variant | default(os_variant) }}"
    _vm_is_openshift: "{{ _current_vm.openshift | default(false) | bool }}"

- name: "{{ _current_vm.name }} | Check if VM already exists"
  community.libvirt.virt:
    command: list_vms
  register: _all_vms

- name: "{{ _current_vm.name }} | Reset per-VM accumulators"
  ansible.builtin.set_fact:
    _vm_macs: []
    _vm_net_args: []
    _vm_disk_args: []

- name: "{{ _current_vm.name }} | Skip if VM already exists"
  when: _vm_fqdn not in _all_vms.list_vms
  block:
    - name: "{{ _current_vm.name }} | Create OS disk from base image"
      ansible.builtin.command:
        cmd: >-
          qemu-img create -f qcow2 -F qcow2
          -b {{ image_cache_dir }}/{{ _vm_base_image }}
          {{ _vm_disk }}
          {{ _current_vm.disk_size }}G
        creates: "{{ _vm_disk }}"

    - name: "{{ _current_vm.name }} | Build OS disk argument"
      ansible.builtin.set_fact:
        _vm_disk_args:
          - "path={{ _vm_disk }},format=qcow2,bus=virtio,cache=none,io=native,discard=unmap"

    - name: "{{ _current_vm.name }} | Create extra disks"
      ansible.builtin.command:
        cmd: >-
          qemu-img create -f qcow2
          -o preallocation=metadata
          {{ storage_pool_path }}/{{ _vm_fqdn }}-{{ item.name }}.qcow2
          {{ item.size }}G
        creates: "{{ storage_pool_path }}/{{ _vm_fqdn }}-{{ item.name }}.qcow2"
      loop: "{{ _current_vm.extra_disks | default([]) }}"
      loop_control:
        label: "{{ item.name }} ({{ item.size }}G)"

    - name: "{{ _current_vm.name }} | Append extra disk arguments"
      ansible.builtin.set_fact:
        _vm_disk_args: >-
          {{ _vm_disk_args +
             ['path=' ~ storage_pool_path ~ '/' ~ _vm_fqdn ~ '-' ~ item.name ~ '.qcow2,format=qcow2,bus=virtio,cache=none,io=native,discard=unmap'] }}
      loop: "{{ _current_vm.extra_disks | default([]) }}"
      loop_control:
        label: "{{ item.name }}"

    - name: "{{ _current_vm.name }} | Generate stable MAC addresses"
      ansible.builtin.set_fact:
        _vm_macs: "{{ _vm_macs + [_mac] }}"
      vars:
        _hash: "{{ (_vm_fqdn ~ '-nic' ~ idx) | hash('md5') }}"
        _mac: >-
          52:54:00:{{ '%02x' % (_hash[0:2] | int(base=16)) -}}
          :{{ '%02x' % (_hash[2:4] | int(base=16)) -}}
          :{{ '%02x' % (_hash[4:6] | int(base=16)) }}
      loop: "{{ range(_current_vm.networks | length) | list }}"
      loop_control:
        loop_var: idx

    # --- Cloud-init path (non-OpenShift VMs) ---
    - name: "{{ _current_vm.name }} | Prepare cloud-init"
      when: not _vm_is_openshift
      block:
        - name: "{{ _current_vm.name }} | Create cloud-init temp directory"
          ansible.builtin.file:
            path: "{{ _vm_ci_dir }}"
            state: directory
            mode: "0755"

        - name: "{{ _current_vm.name }} | Generate cloud-init meta-data"
          ansible.builtin.template:
            src: meta-data.yml.j2
            dest: "{{ _vm_ci_dir }}/meta-data"
            mode: "0644"

        - name: "{{ _current_vm.name }} | Generate cloud-init user-data"
          ansible.builtin.template:
            src: user-data.yml.j2
            dest: "{{ _vm_ci_dir }}/user-data"
            mode: "0644"

        - name: "{{ _current_vm.name }} | Generate cloud-init network-config"
          ansible.builtin.template:
            src: network-config.yml.j2
            dest: "{{ _vm_ci_dir }}/network-config"
            mode: "0644"

        - name: "{{ _current_vm.name }} | Create cloud-init ISO"
          ansible.builtin.command:
            cmd: >-
              genisoimage -output {{ _vm_cidata }}
              -volid cidata -joliet -rock
              {{ _vm_ci_dir }}/user-data
              {{ _vm_ci_dir }}/meta-data
              {{ _vm_ci_dir }}/network-config
          changed_when: true

    # --- Ignition path (OpenShift / RHCOS VMs) ---
    - name: "{{ _current_vm.name }} | Prepare ignition"
      when: _vm_is_openshift
      block:
        - name: "{{ _current_vm.name }} | Create ignition directory"
          ansible.builtin.file:
            path: "{{ ignition_dir }}"
            state: directory
            mode: "0755"

        - name: "{{ _current_vm.name }} | Generate pointer ignition"
          ansible.builtin.template:
            src: pointer-ignition.json.j2
            dest: "{{ ignition_dir }}/{{ _vm_fqdn }}.ign"
            mode: "0644"

    # --- Build virt-install network arguments ---
    - name: "{{ _current_vm.name }} | Build virt-install network arguments"
      ansible.builtin.set_fact:
        _vm_net_args: "{{ _vm_net_args + [_net_arg | trim] }}"
      vars:
        _net_arg: >-
          {% if nic_pair.0.type == 'bridge' -%}
            --network bridge={{ nic_pair.0.source }},model=virtio,mac={{ nic_pair.1 }}
          {%- else -%}
            --network network={{ nic_pair.0.source }},model=virtio,mac={{ nic_pair.1 }}
          {%- endif %}
      loop: "{{ _current_vm.networks | zip(_vm_macs) | list }}"
      loop_control:
        loop_var: nic_pair

    # --- Create VM (cloud-init) ---
    - name: "{{ _current_vm.name }} | Create and start VM (cloud-init)"
      ansible.builtin.command:
        cmd: >-
          virt-install
          --name {{ _vm_fqdn }}
          --memory {{ _current_vm.memory }}
          --vcpus {{ _current_vm.vcpus }}
          {{ _vm_disk_args | map('regex_replace', '^', '--disk ') | join(' ') }}
          --disk path={{ _vm_cidata }},device=cdrom
          {{ _vm_net_args | join(' ') }}
          --os-variant {{ _vm_os_variant }}
          --virt-type kvm
          --graphics none
          --console pty,target_type=serial
          --import
          --noautoconsole
      when: not _vm_is_openshift
      changed_when: true

    # --- Create VM (ignition / RHCOS) ---
    - name: "{{ _current_vm.name }} | Create and start VM (ignition)"
      ansible.builtin.command:
        cmd: >-
          virt-install
          --name {{ _vm_fqdn }}
          --memory {{ _current_vm.memory }}
          --vcpus {{ _current_vm.vcpus }}
          {{ _vm_disk_args | map('regex_replace', '^', '--disk ') | join(' ') }}
          {{ _vm_net_args | join(' ') }}
          --os-variant {{ _vm_os_variant }}
          --virt-type kvm
          --graphics none
          --console pty,target_type=serial
          --import
          --noautoconsole
          --qemu-commandline="-fw_cfg name=opt/com.coreos/config,file={{ ignition_dir }}/{{ _vm_fqdn }}.ign"
      when: _vm_is_openshift
      changed_when: true

    - name: "{{ _current_vm.name }} | Set VM to autostart"
      community.libvirt.virt:
        name: "{{ _vm_fqdn }}"
        autostart: true

    - name: "{{ _current_vm.name }} | Clean up cloud-init temp directory"
      ansible.builtin.file:
        path: "{{ _vm_ci_dir }}"
        state: absent
      when: not _vm_is_openshift

    - name: "{{ _current_vm.name }} | Determine wait IP"
      ansible.builtin.set_fact:
        _vm_wait_ip: "{{ _current_vm.networks | selectattr('ip', 'defined') | map(attribute='ip') | first | default('') }}"

    - name: "{{ _current_vm.name }} | Remove stale SSH host keys for VM IPs"
      ansible.builtin.known_hosts:
        name: "{{ item }}"
        state: absent
      loop: "{{ _current_vm.networks | selectattr('ip', 'defined') | map(attribute='ip') | list }}"
      become: false
      when: not _vm_is_openshift

    - name: "{{ _current_vm.name }} | Wait for VM to become reachable via SSH"
      ansible.builtin.wait_for:
        host: "{{ _vm_wait_ip }}"
        port: 22
        delay: 10
        timeout: 300
      when:
        - _vm_wait_ip | length > 0
        - not _vm_is_openshift
