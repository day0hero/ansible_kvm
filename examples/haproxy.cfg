# Example haproxy.cfg for OCP load balancer
# The Ansible role uses a Jinja2 template (roles/ocp_bastion/templates/haproxy.cfg.j2)
# to dynamically generate this file. This is provided as a reference.
global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    timeout connect 10s
    timeout client  60s
    timeout server  60s

listen stats
    bind *:9000
    mode http
    stats enable
    stats uri /
    stats refresh 10s

frontend api
    bind *:6443
    mode tcp
    option tcplog
    default_backend api-backends

backend api-backends
    mode tcp
    balance roundrobin
    option ssl-hello-chk
    server bootstrap bootstrap.ocp.rhuk.local:6443 check
    server cp        cp.ocp.rhuk.local:6443 check

frontend machine-config
    bind *:22623
    mode tcp
    option tcplog
    default_backend machine-config-backends

backend machine-config-backends
    mode tcp
    balance roundrobin
    server bootstrap bootstrap.ocp.rhuk.local:22623 check
    server cp        cp.ocp.rhuk.local:22623 check

frontend ingress-https
    bind *:443
    mode tcp
    option tcplog
    default_backend ingress-https-backends

backend ingress-https-backends
    mode tcp
    balance roundrobin
    server cp cp.ocp.rhuk.local:443 check

frontend ingress-http
    bind *:80
    mode tcp
    option tcplog
    default_backend ingress-http-backends

backend ingress-http-backends
    mode tcp
    balance roundrobin
    server cp cp.ocp.rhuk.local:80 check
