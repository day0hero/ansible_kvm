---
# Example install-config.yaml for disconnected OpenShift installation
# The Ansible role uses a Jinja2 template (roles/ocp_bastion/templates/install-config.yaml.j2)
# to dynamically generate this file. This is provided as a reference.
apiVersion: v1
baseDomain: rhuk.local
metadata:
  name: ocp
networking:
  clusterNetwork:
    - cidr: 10.128.0.0/14
      hostPrefix: 23
  machineNetwork:
    - cidr: 192.168.127.0/24
  serviceNetwork:
    - 172.30.0.0/16
  networkType: OVNKubernetes
compute:
  - name: worker
    replicas: 0
controlPlane:
  name: master
  replicas: 1
platform:
  none: {}
fips: false
pullSecret: '<MERGED_PULL_SECRET_JSON>'
sshKey: '<SSH_PUBLIC_KEY>'
additionalTrustBundle: |
  -----BEGIN CERTIFICATE-----
  <QUAY_MIRROR_REGISTRY_CA_CERT>
  -----END CERTIFICATE-----
imageDigestSources:
  - mirrors:
      - bastion.rhuk.local:8443/openshift/release-images
    source: quay.io/openshift-release-dev/ocp-release
  - mirrors:
      - bastion.rhuk.local:8443/openshift/release
    source: quay.io/openshift-release-dev/ocp-v4.0-art-dev
