---
- name: Tear down libvirt virtual machines
  hosts: pn50
  gather_facts: false
  environment:
    LIBVIRT_DEFAULT_URI: "{{ libvirt_uri | default('qemu:///system') }}"

  tasks:
    - name: Initialize FQDN list
      ansible.builtin.set_fact:
        _vm_fqdns: []
        _storage: "{{ storage_pool_path | default('/var/lib/libvirt/images') }}"
        _airgap: "{{ libvirt_network_airgap | default({'name': 'airgap', 'bridge': 'virbr-ag'}) }}"
        _all_vms_combined: "{{ (infra_vms | default([])) + (ocp_vms | default([])) }}"

    - name: Build VM FQDN list
      ansible.builtin.set_fact:
        _vm_fqdns: "{{ _vm_fqdns + [_fqdn] }}"
      vars:
        _fqdn: "{{ item.name }}{% if cluster_name | default('') | length > 0 %}.{{ cluster_name }}{% endif %}.{{ dns_domain }}"
      loop: "{{ _all_vms_combined }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Get running VMs
      community.libvirt.virt:
        command: list_vms
      register: _all_vms

    - name: Destroy VMs
      community.libvirt.virt:
        name: "{{ item }}"
        state: destroyed
      loop: "{{ _vm_fqdns }}"
      when: item in _all_vms.list_vms
      failed_when: false

    - name: Undefine VMs
      ansible.builtin.command:
        cmd: "virsh undefine {{ item }} --nvram"
      loop: "{{ _vm_fqdns }}"
      when: item in _all_vms.list_vms
      failed_when: false
      changed_when: true

    - name: Remove VM OS disk images
      ansible.builtin.file:
        path: "{{ _storage }}/{{ item }}.qcow2"
        state: absent
      loop: "{{ _vm_fqdns }}"

    - name: Remove extra disk images
      ansible.builtin.file:
        path: "{{ _storage }}/{{ _fqdn }}-{{ item.1.name }}.qcow2"
        state: absent
      vars:
        _fqdn: "{{ item.0.name }}{% if cluster_name | default('') | length > 0 %}.{{ cluster_name }}{% endif %}.{{ dns_domain }}"
      loop: "{{ _all_vms_combined | subelements('extra_disks', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }}-{{ item.1.name }}"

    - name: Remove cloud-init ISOs
      ansible.builtin.file:
        path: "{{ _storage }}/{{ item }}-cidata.iso"
        state: absent
      loop: "{{ _vm_fqdns }}"

    - name: Remove ignition files
      ansible.builtin.file:
        path: "{{ ignition_dir | default('/var/lib/libvirt/ignition') }}/{{ item }}.ign"
        state: absent
      loop: "{{ _vm_fqdns }}"

    - name: Remove all DNS host entries from airgap network
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          virsh net-dumpxml {{ _airgap.name }} 2>/dev/null |
          grep -oP '<host ip=[^/]+</host>' |
          while IFS= read -r entry; do
            virsh net-update {{ _airgap.name }} delete dns-host "$entry" --live --config 2>/dev/null || true;
          done
      changed_when: false
      failed_when: false

    - name: Remove NM dispatcher script for split DNS
      ansible.builtin.file:
        path: "/etc/NetworkManager/dispatcher.d/99-dns-{{ _airgap.name }}"
        state: absent
      become: true

    - name: Remove bastion SSH host key from known_hosts
      ansible.builtin.known_hosts:
        name: "bastion{% if cluster_name | default('') | length > 0 %}.{{ cluster_name }}{% endif %}.{{ dns_domain }}"
        state: absent
      become: false

- name: Remove bastion SSH host key from local known_hosts
  hosts: localhost
  gather_facts: false
  connection: local

  tasks:
    - name: Remove bastion host key by FQDN
      ansible.builtin.known_hosts:
        name: "bastion{% if cluster_name | default('') | length > 0 %}.{{ cluster_name }}{% endif %}.{{ dns_domain }}"
        state: absent

    - name: Remove bastion host key by IP
      ansible.builtin.known_hosts:
        name: "{{ item }}"
        state: absent
      loop: >-
        {{ infra_vms | default([]) |
           selectattr('name', 'equalto', 'bastion') |
           map(attribute='networks') | flatten |
           map(attribute='ip') | list }}
